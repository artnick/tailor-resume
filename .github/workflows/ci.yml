name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resume_builder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d resume_builder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/resume_builder?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate

      - name: Run migrations
        run: pnpm --filter api db:migrate:deploy

      - name: Seed database
        run: pnpm --filter api db:seed

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm check-types

      - name: Test
        run: pnpm --filter @repo/shared test && pnpm --filter @repo/renderer test && pnpm --filter api test:e2e

      - name: Build
        run: pnpm build
